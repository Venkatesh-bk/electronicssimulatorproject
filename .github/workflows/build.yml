name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
      with:
        lfs: true

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore EdaSimulator.sln

    - name: Build
      run: dotnet build EdaSimulator.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test EdaSimulator.sln --no-build --verbosity normal
